name: CI

on:
  pull_request:
    branches: ["master"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  push:
    branches: ["master"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: vet & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: internal/ui/package-lock.json

      - name: Build frontend
        working-directory: internal/ui
        run: npm ci && npm run build

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...
